# ==========================================
# 운영 DB 접속 설정 (환경 변수 활용)
# ==========================================
# 1. 서버에 설정된 환경 변수 값을 읽어와 DB에 연결 (보안 유지)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
# 2. 엔티티와 실제 DB 테이블 구조가 일치하는지만 검증 (절대 운영 DB 테이블을 임의로 수정/삭제하지 않음)
spring.jpa.hibernate.ddl-auto=validate

# 3. 성능 최적화를 위해 불필요한 콘솔 쿼리 출력을 끔
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# 로깅 설정
# ==========================================
# 4. 전체 로그는 경고(WARN) 이상만 남기고, 우리 프로젝트(Backend-MATE)의 로그만 INFO 레벨로 확인
logging.level.root=warn
logging.level.com.mate=info