# ==========================================
# In-Memory Database 설정 (H2)
# ==========================================
# 1. 테스트용 H2 드라이버 및 메모리 주소 설정 (MariaDB 모드로 동작하여 문법 충돌 방지)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:mate_test;MODE=MariaDB;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
# 2. 보통 테스트 시에는 ddl-auto를 create-drop으로 설정하여 테스트 후 테이블을 삭제합니다.
spring.jpa.hibernate.ddl-auto=create-drop

# 3. 테스트 중 실행되는 쿼리 확인
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# 로깅 설정
# ==========================================
# 4. 테스트 결과 창이 너무 길어지지 않도록 기본 로그는 INFO 레벨로 제한
logging.level.root=info