<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리</title>
    <style>
        body { margin:0; font-family:Arial; background:#f1f5f9; }

        .header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#1e293b; color:white; }
        .header-right { display:flex; gap:10px; align-items:center; }
        .search-box {
            display:flex;
            align-items:center;
            gap:5px;
        }

        .search-box input {
            padding:6px 10px;
            border-radius:5px;
            border:none;
        }

        .search-box button {
            padding:6px 10px;
            border:none;
            border-radius:5px;
            background:#6366f1;
            color:white;
            cursor:pointer;
        }

        .container { display:flex; }
        .sidebar { width:220px; background:#0f172a; color:white; padding:20px; height:100vh; }
        .sidebar a { display:block; padding:10px; color:white; text-decoration:none; }
        .sidebar a:hover { background:#1e293b; }

        .main { flex:1; padding:20px; }
        .card { background:white; padding:15px; border-radius:10px; }
        .left {
            display:flex;
            gap:20px;
            align-items:center;
        }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #ddd; }

        .pagination { text-align:center; margin-top:10px; }
        .pagination button { margin:2px; padding:5px 10px; }
    </style>
</head>

<body>

<div class="header">
    <div class="left">
        <div>mate ADMIN</div>
        <div class="title">로그 관리</div>
    </div>

    <div class="header-right">
        <!-- 🔍 검색창 -->
        <form class="search-box" action="/admin/search" method="get">
            <input type="text" name="keyword" placeholder="로그 검색...">
            <button type="submit">🔍</button>
        </form>

        <div>📜</div>
    </div>
</div>

<div class="container">

    <!-- 사이드바 그대로 -->
    <div class="sidebar">
        <div>👤 관리자</div>
        <div>Super Admin</div>
        <a href="/admin/dashboard">📊 대시보드</a>
        <a href="/admin/users">👥 회원관리</a>
        <a href="/admin/projects">📋 게시글관리</a>
        <a href="/admin/logs">📜 활동로그</a>

        <div style="margin-top:50px;">
            <a href="#">🚪 로그아웃</a>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h3>활동 로그</h3>

            <ul>
                <li th:each="log : ${logs}" th:text="${log}"></li>
            </ul>

            <div class="pagination">
                <button>&lt;</button>
                <button class="active">1</button>
                <button>2</button>
                <button>3</button>
                <button>&gt;</button>
            </div>
        </div>
    </div>

</div>

<script>
    function toggleSearch(){
        const box = document.getElementById("searchBox");
        box.style.display = box.style.display === "block" ? "none" : "block";
    }
</script>

</body>
</html>
