<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시물 관리</title>
    <style>
        body { margin:0; font-family:Arial; background:#f1f5f9; }

        .header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#1e293b; color:white; }
        .header-right { display:flex; gap:10px; align-items:center; }
        .search-box { display:flex; align-items:center; gap:5px; }
        .search-box input { padding:6px 10px; border-radius:5px; border:none; }
        .search-box button { padding:6px 10px; border:none; border-radius:5px; background:#6366f1; color:white; cursor:pointer; }

        .container { display:flex; }
        .sidebar { width:220px; background:#0f172a; color:white; padding:20px; height:100vh; }
        .sidebar a { display:block; padding:10px; color:white; text-decoration:none; }
        .sidebar a:hover { background:#1e293b; }

        .main { flex:1; padding:20px; }
        .card { background:white; padding:15px; border-radius:10px; text-align:center;}

        .left { display:flex; gap:20px; align-items:center; }

        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center;}

        .btn-delete { background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; }
        .pagination { text-align:center; margin-top:10px; }
        .pagination button { margin:2px; padding:5px 10px; cursor:pointer; }
        .pagination .active { background:#6366f1; color:white; }
    </style>
</head>

<body>

<div class="header">
    <div class="left">
        <div>mate ADMIN</div>
        <div class="title">게시물 관리</div>
    </div>

    <div class="header-right">
        <form class="search-box" action="/admin/search" method="get">
            <input type="text" name="keyword" placeholder="게시글 검색...">
            <button type="submit">🔍</button>
        </form>
        <div>📋</div>
    </div>
</div>

<div class="container">

    <!-- 사이드바 -->
    <div class="sidebar">
        <div>👤 관리자</div>
        <div>Super Admin</div>
        <a href="/admin/dashboard">📊 대시보드</a>
        <a href="/admin/users">👥 회원관리</a>
        <a href="/admin/projects">📋 게시글관리</a>
        <a href="/admin/logs">📜 활동로그</a>
        <div style="margin-top:50px;">
            <a href="#">🚪 로그아웃</a>
        </div>
    </div>

    <!-- 메인 -->
    <div class="main">
        <div class="card">
            <h3>게시글 목록</h3>

            <table>
                <tr>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>등록일</th>
                    <th>신청자</th>
                    <th>관리</th>
                </tr>

                <tr th:each="p : ${projects}">
                    <td th:text="${p.title}"></td>
                    <td th:text="${p.ownerNickname != null ? p.ownerNickname : '알수없음'}"></td>
                    <td th:text="${p.createdAt}"></td>
                    <td th:text="${p.currentCount} + '명'"></td>
                    <td>
                        <button class="btn-project-detail" th:attr="data-id=${p.id}">상세</button>
                        <form th:action="@{/admin/projects/delete/{id}(id=${p.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-delete">삭제</button>
                        </form>
                    </td>
                </tr>
            </table>

            <div class="pagination">
                <button>&lt;</button>
                <button class="active">1</button>
                <button>2</button>
                <button>3</button>
                <button>&gt;</button>
            </div>
        </div>
    </div>

</div>

<!-- PROJECT DETAIL MODAL -->
<!-- PROJECT DETAIL MODAL -->
<div id="projectDetailModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
     background:white; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.3); z-index:1000; width:400px;">
    <h3>프로젝트 상세 정보</h3>
    <div id="projectModalContent"></div>
    <button onclick="closeProjectModal()">닫기</button>
</div>

<div id="projectModalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.5); z-index:900;" onclick="closeProjectModal()"></div>
<script>
    // 프로젝트 상세 모달
    document.querySelectorAll('.btn-project-detail').forEach(btn => {
        btn.addEventListener('click', function() {
            const projectId = this.dataset.id;

            fetch(`/admin/projects/${projectId}`)
                .then(res => {
                    if (!res.ok) throw new Error("프로젝트 정보를 불러오는데 실패했습니다.");
                    return res.json();
                })
                .then(project => {
                    const content = `
                        <p><strong>제목:</strong> ${project.title}</p>
                        <p><strong>작성자:</strong> ${project.owner ? project.owner.nickname : '알 수 없음'}</p>
                        <p><strong>카테고리:</strong> ${project.category}</p>
                        <p><strong>내용:</strong> ${project.content}</p>
                        <p><strong>모집 인원:</strong> ${project.recruitCount}명</p>
                        <p><strong>현재 인원:</strong> ${project.currentCount}명</p>
                        <p><strong>온/오프라인:</strong> ${project.onOffline}</p>
                        <p><strong>상태:</strong> ${project.status}</p>
                        <p><strong>마감일:</strong> ${new Date(project.endDate).toLocaleDateString()}</p>
                    `;
                    document.getElementById('projectModalContent').innerHTML = content;
                    openProjectModal();
                })
                .catch(err => alert(err.message));
        });
    });

    function openProjectModal() {
        document.getElementById('projectDetailModal').style.display = 'block';
        document.getElementById('projectModalOverlay').style.display = 'block';
    }
    function closeProjectModal() {
        document.getElementById('projectDetailModal').style.display = 'none';
        document.getElementById('projectModalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
