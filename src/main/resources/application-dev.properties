# ==========================================
# 로컬 MariaDB 접속 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/mate_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=maria

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# DB 초기화 스크립트 (data.sql) 설정
# ==========================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 로깅 설정
# ==========================================
logging.level.com.rookies5.Backend_MATE=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}:%line] - %msg%n

# ==========================================
# Flyway 비활성화 (JPA와 data.sql만 사용하기 위함)
# ==========================================
spring.flyway.enabled=false
