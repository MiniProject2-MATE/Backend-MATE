# ==========================================
# 로컬 MariaDB 접속 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/mate_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=maria

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
# 💡 서버 시작 시 테이블을 싹 지우고 새로 만듦
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# 💡 DB 초기화 스크립트 (data.sql) 설정
# ==========================================
# 항상 sql 스크립트를 실행하겠다는 옵션
spring.sql.init.mode=always
# JPA가 테이블(Schema)을 먼저 생성한 뒤에 data.sql(Data)이 실행되도록 순서 보장
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 로깅 설정
# ==========================================
# SQL 쿼리의 '?' 파라미터에 실제 어떤 값이 들어가는지 추적
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# Flyway 비활성화 (JPA와 data.sql만 사용하기 위함)
# ==========================================
spring.flyway.enabled=false

# ========================================================
# JWT 암호화에 사용할 시크릿 키 (최소 256비트 이상의 무작위 문자열)
# ========================================================
