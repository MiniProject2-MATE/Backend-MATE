# ==========================================
# 로컬 MariaDB 접속 설정
# ==========================================
# 1. MariaDB 드라이버 지정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# 2. 로컬 DB 주소 (mate_db 연결, 타임존 및 한글 인코딩 설정 포함)
spring.datasource.url=jdbc:mariadb://localhost:3306/mate_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# 3. 본인의 로컬 MariaDB 아이디 및 비밀번호 (팀원 문서 기준 1234 또는 본인 설정인 maria로 맞춤 변경)
spring.datasource.username=root
spring.datasource.password=maria

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
# 4. 우리가 짤 Entity 클래스 코드를 보고 DB 테이블을 자동으로 생성/수정해 주는 마법의 옵션!
spring.jpa.hibernate.ddl-auto=update

# 5. 콘솔 창에 실행되는 SQL 쿼리문을 보여줌
spring.jpa.show-sql=true

# 6. SQL 쿼리를 한 줄이 아니라 예쁘게 줄바꿈해서 보여줌
spring.jpa.properties.hibernate.format_sql=true

# 7. MariaDB 전용 문법 사용 (최적화된 쿼리 생성)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# 로깅 설정
# ==========================================
# 8. SQL 쿼리의 '?' 파라미터에 실제 어떤 값이 들어가는지 추적 (디버깅 필수)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE