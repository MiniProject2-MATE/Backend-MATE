# ==========================================
# 로컬 MariaDB 접속 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/mate_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=maria

# ==========================================
# JPA 및 Hibernate 설정
# ==========================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==========================================
# DB 초기화 스크립트 (data.sql) 설정
# ==========================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 로깅 설정
# ==========================================
logging.level.com.rookies5.Backend_MATE=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%logger{36}:%line] - %msg%n

# ==========================================
# Flyway 비활성화 (JPA와 data.sql만 사용하기 위함)
# ==========================================
spring.flyway.enabled=false


# ========================================================
# JWT 암호화에 사용할 시크릿 키 (최소 256비트 이상의 무작위 문자열)
# ========================================================
jwt.secret=matebackendrookies5springboottokentestkey1234567890qwertyuiop

# 파일 하나당 최대 크기 (기본 1MB -> 5MB로 증설)
spring.servlet.multipart.max-file-size=5MB

# 한 번의 요청(파일+데이터)에 담긴 전체 크기
spring.servlet.multipart.max-request-size=5MB

